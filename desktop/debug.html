<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawTab Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/debug.tsx"></script>
  <script>
    const attrs = { autocomplete: 'off', autocorrect: 'off', autocapitalize: 'off', spellcheck: 'false' };
    const apply = (el) => {
      for (const [k, v] of Object.entries(attrs)) {
        if (el.getAttribute(k) !== v) el.setAttribute(k, v);
      }
      if (el.spellcheck !== false) el.spellcheck = false;
    };
    const start = () => {
      const root = document.getElementById('root');
      if (!root) return;
      root.querySelectorAll('input, textarea').forEach(apply);
      const observer = new MutationObserver(() => {
        document.querySelectorAll('input, textarea').forEach(apply);
      });
      observer.observe(root, { childList: true, subtree: true });
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', start);
    } else {
      start();
    }
  </script>
</body>
</html>
